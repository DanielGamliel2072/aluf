<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אלוף השטיחים - קטלוג 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            scroll-behavior: smooth;
        }
        .carpet-card:hover .carpet-image {
            transform: scale(1.05);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4a373;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bc8a5f;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CARPETS_DATA = [
            { id: 20, name: "שטיח בוהו-נטורל דגם BOH-84", type: "מודרני", price: 1250, colors: ["קרם", "בז'"], sizes: ["160x230", "200x290"], rating: 5.0, description: "שטיח בוהו-שיק בעבודת אריגה ייחודית המשלבת טקסטורות מובלטות ופרנזים מעוצבים. השטיח עשוי מחומרים טבעיים ומעניק אווירת רוגע ונוחות לבית המודרני.", image: "https://i.ibb.co/S4pchMkH/IMG-1784.png" },
            { id: 17, name: "שטיח אבסטרקט גלקסיה דגם HA-QTK", type: "מודרני", price: 1650, colors: ["כחול", "כתום", "אפור"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב נועז ומרגש המשלבת משיכות מכחול אבסטרקטיות בגווני כחול עמוק, כתום תוסס ואפור.", image: "https://i.ibb.co/Pv8Vss1Q/Gemini-Generated-Image-haqtkxhaqtkxhaqt.png" },
            { id: 16, name: "שטיח גיאומטרי תלת-ממד דגם UF-SDY", type: "מודרני", price: 1590, colors: ["אפור", "קרם", "בז'"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב גיאומטרי חדשני המשלב טקסטורות עומק וגבהים שונים של סיבים, למראה תלת-ממדי יוקרתי.", image: "https://i.ibb.co/kgWnr2FG/Gemini-Generated-Image-ufsdyjufsdyjufsd.png" },
            { id: 15, name: "שטיח אבסטרקט אוקיינוס דגם YQI-XI", type: "מודרני", price: 1350, colors: ["כחול", "תכלת", "אפור"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב השואב השראה ממעמקי האוקיינוס, עם מעברים רכים בין כחול עמוק לתכלת ואפור.", image: "https://i.ibb.co/BVkzWS7y/Gemini-Generated-Image-yqixityqixityqix.png" },
            { id: 14, name: "שטיח אבסטרקט לבה דגם MLU-9W", type: "מודרני", price: 1480, colors: ["כתום", "אפור", "חום"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב עוצמתי המשלבת גווני כתום חלודה עם אפור עמוק וטקסטורות חוליות.", image: "https://i.ibb.co/G34ddkxS/Gemini-Generated-Image-mlu9w4mlu9w4mlu9.png" },
            { id: 13, name: "שטיח אבסטרקט מלורי דגם F4P-U0", type: "מודרני", price: 1420, colors: ["אפור", "כחול", "לבן"], sizes: ["160x230", "200x290", "240x340"], rating: 5.0, description: "עיצוב אבסטרקטי מרהיב המשלב זרימה של גווני אפור וכחול שמיים עם נגיעות לבן צחור.", image: "https://i.ibb.co/CyCwn88/Gemini-Generated-Image-f4pu0ff4pu0ff4pu.png" },
            { id: 12, name: "שטיח מנדלה רויאל דגם K1X-C4", type: "קלאסי", price: 1550, colors: ["כחול", "לבן", "זהב"], sizes: ["200x200", "240x240", "160x230"], rating: 5.0, description: "עיצוב מנדלה עוצר נשימה בגווני כחול מלכותי ולבן עם עיטורי זהב עדינים.", image: "https://i.ibb.co/prwYQQ8Z/Gemini-Generated-Image-k1xc44k1xc44k1xc.png" },
            { id: 2, name: "שטיח איספהאן קלאסי", type: "קלאסי", price: 1200, colors: ["אדום", "זהב"], sizes: ["170x240", "250x350"], rating: 4.8, description: "שטיח פרסי בעבודת מכונה מדויקת, עיצוב עשיר בפרטים המעניק מראה חם ואריסטוקרטי לכל חלל.", image: "https://images.unsplash.com/photo-1600166898405-da9535204843?auto=format&fit=crop&q=80&w=800" }
        ];

        const REVIEWS_DATA = [
            { id: 1, name: "מיכל כהן", text: "השטיח הגיע מהר מאוד, האיכות פשוט מדהימה. השטיח רך ונעים למגע, בדיוק מה שחיפשתי לסלון.", stars: 5 },
            { id: 2, name: "יוסי לוי", text: "שירות מעולה ומקצועי. הדגם הגיאומטרי שקניתי משנה את כל האווירה בבית. מומלץ בחום!", stars: 5 },
            { id: 3, name: "עדי רז", text: "חיפשתי שטיח בוהו שיהיה גם איכותי וגם קל לניקוי. מצאתי כאן את הדגם המושלם. תודה רבה!", stars: 5 },
            { id: 4, name: "דניאל סופר", text: "המחירים הוגנים והמבחר עצום. קניתי שטיח אבסטרקט וקיבלתי המון מחמאות עליו.", stars: 4 }
        ];

        const colorMap = {
            "אפור": "#808080", "קרם": "#f5f5dc", "כחול": "#2b4c7e", "אדום": "#b22222", "זהב": "#d4af37",
            "לבן": "#ffffff", "תכלת": "#87ceeb", "חום": "#5d4037", "כתום": "#d35400", "בז'": "#d2b48c"
        };

        // Improved Icon Component for React & Lucide CDN
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [filters, setFilters] = useState({ type: 'הכל', color: 'הכל' });
            const [contactSuccess, setContactSuccess] = useState(false);
            const contactEmail = "danielgamliel2072@gmail.com";

            const filteredProducts = useMemo(() => {
                return CARPETS_DATA.filter(p => {
                    const matchesType = filters.type === 'הכל' || p.type === filters.type;
                    const matchesColor = filters.color === 'הכל' || p.colors.includes(filters.color);
                    return matchesType && matchesColor;
                });
            }, [filters]);

            const navigateToProduct = (product) => {
                setSelectedProduct(product);
                setCurrentPage('product');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const navigateHome = () => {
                setCurrentPage('home');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="sticky top-0 z-50 glass-effect border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                            <h1 
                                className="text-2xl md:text-3xl font-black text-amber-900 cursor-pointer transition-transform hover:scale-105" 
                                onClick={navigateHome}
                            >
                                אלוף השטיחים
                            </h1>
                            <div className="flex items-center gap-3">
                                <a 
                                    href={`mailto:${contactEmail}`}
                                    className="bg-amber-100 text-amber-900 px-4 md:px-6 py-2 rounded-full font-bold flex items-center gap-2 hover:bg-amber-200 transition"
                                >
                                    <Icon name="mail" />
                                    <span className="hidden md:inline">צור קשר</span>
                                </a>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
                        {currentPage === 'home' ? (
                            <div className="space-y-12">
                                {/* Hero Section */}
                                <div className="relative rounded-[2rem] overflow-hidden h-[300px] md:h-[450px] flex items-center justify-center text-center text-white bg-amber-900">
                                    <img 
                                        src="https://images.unsplash.com/photo-1579656592043-a20e25a4aa4b?auto=format&fit=crop&q=80&w=1600" 
                                        alt="Luxury Carpet Collection"
                                        className="absolute inset-0 w-full h-full object-cover opacity-50" 
                                    />
                                    <div className="relative z-10 px-6 max-w-2xl">
                                        <h2 className="text-4xl md:text-6xl font-black mb-4 drop-shadow-lg">קולקציית פרימיום 2026</h2>
                                        <p className="text-lg md:text-xl font-light opacity-90 italic">השילוב המושלם בין אמנות מסורתית לעיצוב עכשווי</p>
                                    </div>
                                </div>

                                {/* Search & Filters */}
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-wrap gap-6">
                                    <div className="flex-1 min-w-[200px]">
                                        <label className="block text-sm font-bold text-gray-500 mb-2">סגנון עיצובי</label>
                                        <select 
                                            className="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-amber-500 outline-none"
                                            value={filters.type}
                                            onChange={(e) => setFilters({...filters, type: e.target.value})}
                                        >
                                            <option>הכל</option>
                                            <option>מודרני</option>
                                            <option>קלאסי</option>
                                        </select>
                                    </div>
                                    <div className="flex-1 min-w-[200px]">
                                        <label className="block text-sm font-bold text-gray-500 mb-2">חיפוש לפי צבע</label>
                                        <select 
                                            className="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-amber-500 outline-none"
                                            value={filters.color}
                                            onChange={(e) => setFilters({...filters, color: e.target.value})}
                                        >
                                            <option>הכל</option>
                                            {Object.keys(colorMap).map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                </div>

                                {/* Products Grid */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {filteredProducts.length > 0 ? filteredProducts.map(product => (
                                        <div 
                                            key={product.id} 
                                            className="carpet-card bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl border border-gray-100 transition-all duration-300 flex flex-col cursor-pointer"
                                            onClick={() => navigateToProduct(product)}
                                        >
                                            <div className="aspect-[4/3] bg-gray-50 relative overflow-hidden">
                                                <img 
                                                    src={product.image} 
                                                    alt={product.name}
                                                    className="carpet-image h-full w-full object-cover transition-transform duration-500" 
                                                    loading="lazy"
                                                />
                                                <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-amber-900 shadow-sm">
                                                    {product.type}
                                                </div>
                                            </div>
                                            <div className="p-6 flex-1 flex flex-col">
                                                <h3 className="text-xl font-bold mb-2 group-hover:text-amber-800 transition">{product.name}</h3>
                                                <div className="flex justify-between items-end mt-auto">
                                                    <div className="flex flex-col">
                                                        <span className="text-xs text-gray-400">החל מ-</span>
                                                        <span className="text-2xl font-black text-amber-800">₪{product.price.toLocaleString()}</span>
                                                    </div>
                                                    <div className="flex gap-1 mb-1">
                                                        <Icon name="chevron-left" className="w-6 h-6 text-amber-600 bg-amber-50 rounded-full p-1" />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="col-span-full py-20 text-center">
                                            <Icon name="search-x" className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                            <h3 className="text-xl font-bold text-gray-400">לא נמצאו שטיחים התואמים את הסינון</h3>
                                            <button 
                                                onClick={() => setFilters({type: 'הכל', color: 'הכל'})}
                                                className="mt-4 text-amber-700 underline font-bold"
                                            >
                                                נקה את כל המסננים
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* Testimonials */}
                                <section className="py-16 bg-white rounded-[3rem] px-8 border border-gray-100">
                                    <div className="text-center mb-12">
                                        <h2 className="text-3xl font-black text-gray-900 mb-2">הלקוחות שלנו ממליצים</h2>
                                        <div className="h-1.5 w-16 bg-amber-500 mx-auto rounded-full"></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                        {REVIEWS_DATA.map(review => (
                                            <div key={review.id} className="flex flex-col h-full bg-gray-50 p-8 rounded-3xl">
                                                <div className="flex gap-1 mb-4">
                                                    {[...Array(5)].map((_, i) => (
                                                        <Icon 
                                                            key={i} 
                                                            name="star" 
                                                            className={`w-4 h-4 ${i < review.stars ? 'text-amber-500 fill-amber-500' : 'text-gray-200'}`} 
                                                        />
                                                    ))}
                                                </div>
                                                <p className="text-gray-600 text-sm italic mb-6 leading-relaxed flex-grow">"{review.text}"</p>
                                                <div className="font-bold text-gray-900 flex items-center gap-2">
                                                    <div className="w-8 h-8 bg-amber-200 rounded-full flex items-center justify-center text-amber-800 text-xs">
                                                        {review.name.charAt(0)}
                                                    </div>
                                                    {review.name}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        ) : (
                            /* Product Details Page */
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <button 
                                    onClick={navigateHome} 
                                    className="flex items-center gap-2 text-amber-800 font-bold hover:text-amber-600 transition group"
                                >
                                    <Icon name="arrow-right" className="transition-transform group-hover:translate-x-1" />
                                    חזרה לקטלוג המלא
                                </button>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 bg-white rounded-[3rem] p-6 md:p-12 shadow-sm border border-gray-100">
                                    <div className="bg-gray-50 rounded-[2rem] p-4 flex items-center justify-center overflow-hidden h-[400px] md:h-[600px]">
                                        <img 
                                            src={selectedProduct.image} 
                                            alt={selectedProduct.name}
                                            className="max-w-full max-h-full object-contain hover:scale-110 transition duration-700" 
                                        />
                                    </div>
                                    <div className="flex flex-col">
                                        <div className="mb-6">
                                            <span className="bg-amber-50 text-amber-800 text-sm font-bold px-4 py-1 rounded-full border border-amber-100">
                                                {selectedProduct.type}
                                            </span>
                                            <h1 className="text-4xl md:text-5xl font-black text-gray-900 mt-4 leading-tight">{selectedProduct.name}</h1>
                                        </div>

                                        <div className="flex items-baseline gap-2 mb-8">
                                            <span className="text-4xl font-black text-amber-800">₪{selectedProduct.price.toLocaleString()}</span>
                                            <span className="text-gray-400 text-sm">(כולל מע"מ)</span>
                                        </div>

                                        <div className="prose prose-amber max-w-none mb-8">
                                            <p className="text-gray-600 text-lg leading-relaxed">{selectedProduct.description}</p>
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
                                            <div className="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                                                <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">גוונים זמינים</p>
                                                <div className="flex gap-3 flex-wrap">
                                                    {selectedProduct.colors.map(c => (
                                                        <div key={c} className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-100">
                                                            <div className="w-4 h-4 rounded-full border border-gray-200" style={{ background: colorMap[c] || '#ccc' }} />
                                                            <span className="text-sm font-bold">{c}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="bg-gray-50 p-6 rounded-2xl border border-gray-100">
                                                <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">מידות במלאי (ס"מ)</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {selectedProduct.sizes.map(s => (
                                                        <span key={s} className="bg-white px-3 py-1.5 rounded-lg text-sm font-bold border border-gray-100 shadow-sm">
                                                            {s}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-auto space-y-4">
                                            <button 
                                                onClick={() => document.getElementById('contact-form')?.scrollIntoView({ behavior: 'smooth' })}
                                                className="w-full bg-amber-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-amber-700 transition-all shadow-lg hover:shadow-amber-200 flex items-center justify-center gap-3"
                                            >
                                                <Icon name="shopping-cart" className="w-6 h-6" />
                                                אני רוצה להזמין
                                            </button>
                                            <p className="text-center text-gray-400 text-sm flex items-center justify-center gap-2">
                                                <Icon name="truck" className="w-4 h-4" />
                                                משלוח חינם עד הבית לכל חלקי הארץ
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Contact Form Section */}
                        <section id="contact-form" className="mt-20 bg-gray-900 rounded-[3.5rem] p-8 md:p-16 text-white relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-96 h-96 bg-amber-600/10 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2"></div>
                            <div className="absolute bottom-0 right-0 w-64 h-64 bg-amber-900/40 rounded-full blur-[80px] translate-x-1/3 translate-y-1/3"></div>
                            
                            <div className="max-w-xl mx-auto relative z-10">
                                {contactSuccess ? (
                                    <div className="text-center py-12 animate-in zoom-in duration-700">
                                        <div className="w-24 h-24 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Icon name="check" className="w-12 h-12 text-green-400" />
                                        </div>
                                        <h3 className="text-4xl font-black mb-4">תודה רבה!</h3>
                                        <p className="text-gray-400 text-xl">פנייתך התקבלה בהצלחה. נציג מומחה מטעמנו יחזור אליך תוך 24 שעות.</p>
                                        <button 
                                            onClick={() => setContactSuccess(false)}
                                            className="mt-8 text-amber-500 font-bold underline"
                                        >
                                            שלח פנייה נוספת
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-10 text-center md:text-right">
                                        <div className="space-y-4">
                                            <h2 className="text-4xl md:text-5xl font-black">התייעצות עם מומחה</h2>
                                            <p className="text-gray-400 text-lg md:text-xl">מתלבטים לגבי המידה או הצבע? השאירו פרטים ונשמח לעזור לכם לבחור את השטיח המושלם.</p>
                                        </div>
                                        
                                        <form 
                                            onSubmit={(e) => { e.preventDefault(); setContactSuccess(true); }} 
                                            className="grid grid-cols-1 gap-5"
                                        >
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                <input 
                                                    required 
                                                    type="text" 
                                                    placeholder="שם מלא" 
                                                    className="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-amber-500 focus:bg-white/10 transition" 
                                                />
                                                <input 
                                                    required 
                                                    type="tel" 
                                                    placeholder="מספר טלפון" 
                                                    className="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-amber-500 focus:bg-white/10 transition" 
                                                />
                                            </div>
                                            <input 
                                                required 
                                                type="email" 
                                                placeholder="כתובת אימייל" 
                                                className="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-amber-500 focus:bg-white/10 transition" 
                                            />
                                            <textarea 
                                                rows="3"
